name: iOS Firebase Distribution

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes"
        required: false
        default: "Test build"

jobs:
  build-and-distribute:
    runs-on: macos-14
    env:
      SCHEME: dictua
      PROJECT: dictua.xcodeproj
      BUNDLE_ID: ua.dict.ios
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Install certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Generate placeholder app icon
        run: |
          python3 - <<'PY'
          import struct, zlib, os
          # Generate a 1024x1024 solid color PNG (no external libs)
          def make_png(path, w, h, rgb):
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xffffffff
                  return struct.pack("!I", len(data)) + tag + data + struct.pack("!I", crc)
              sig = b"\x89PNG\r\n\x1a\n"
              ihdr = struct.pack("!IIBBBBB", w, h, 8, 2, 0, 0, 0)
              raw = b""
              row = bytes(rgb) * w
              for _ in range(h):
                  raw += b"\x00" + row
              idat = zlib.compress(raw, 9)
              with open(path, "wb") as f:
                  f.write(sig)
                  f.write(chunk(b"IHDR", ihdr))
                  f.write(chunk(b"IDAT", idat))
                  f.write(chunk(b"IEND", b""))
          os.makedirs("dictua/Assets.xcassets/AppIcon.appiconset", exist_ok=True)
          make_png("dictua/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png", 1024, 1024, (0x1E, 0x90, 0xFF))
          print("Generated AppIcon-1024.png")
          PY
          ls -la dictua/Assets.xcassets/AppIcon.appiconset/

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/dictua.xcarchive \
            SDKROOT=iphoneos \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>release-testing</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/dictua.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RELEASE_NOTES: ${{ github.event.inputs.notes || 'Automated build' }}
        run: |
          # Write service account JSON to a temp file
          SA_PATH=$RUNNER_TEMP/firebase-sa.json
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > $SA_PATH
          export GOOGLE_APPLICATION_CREDENTIALS=$SA_PATH

          # Install Firebase CLI
          npm install -g firebase-tools

          firebase appdistribution:distribute "$RUNNER_TEMP/export/dictua.ipa" \
            --app "$FIREBASE_APP_ID" \
            --groups "testers" \
            --release-notes "$RELEASE_NOTES"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
